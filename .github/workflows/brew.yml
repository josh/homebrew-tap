name: Homebrew

on: [push]

jobs:
  audit:
    runs-on: ubuntu-24.04

    env:
      HOMEBREW_DEVELOPER: "1"

    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@59e6b20d96df1a3c9ccb0aa402676e01a4cc6ff3 # master

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install-bundler-gems --groups=audit,style

      - name: Install brew style dependencies
        run: |
          brew install actionlint shellcheck

      - name: Style
        run: |
          brew style josh/tap

      - name: Audit formulas
        run: |
          brew audit --strict --online --tap josh/tap
